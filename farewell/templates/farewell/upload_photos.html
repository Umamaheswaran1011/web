{% extends 'farewell/base.html' %}
{% load static %}

{% block content %}
<div class="container" style="display: block;">
    <div class="form-container animate-on-scroll fade-in">
        
        <form id="uploadForm" method="post" enctype="multipart/form-data" hx-boost="false">
            {% csrf_token %}

            <div class="form-group">
                <label>Select Photos</label>
                <div class="upload-zone" id="uploadZone">
                    <span class="upload-icon">📸</span>
                    <p style="color: #5a4a3a; font-family: 'Patrick Hand', cursive;" id="uploadText">Click to select photos</p>
                    <input type="file" name="images" multiple accept="image/*" class="file-input-hidden" id="fileInput">
                    <p class="upload-hint">You can select multiple photos at once</p>
                </div>
                <div class="preview-grid" id="previewGrid"></div>
            </div>

            <div class="form-group">
                <label for="{{ form.caption.id_for_label }}">{{ form.caption.label }}</label>
                {{ form.caption }}
            </div>

            <button type="submit" id="submitBtn" class="btn-submit">📸 {{ button_text|default:"Upload" }}</button>
        </form>
        
        <div style="text-align: center;">
            <a href="{% url 'farewell:event_detail' pk=event.pk %}" class="back-link">← Back to {{ event.title }}</a>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const input = document.getElementById('fileInput');
    const previewGrid = document.getElementById('previewGrid');
    const uploadText = document.getElementById('uploadText');
    const uploadForm = document.getElementById('uploadForm');
    const submitBtn = document.getElementById('submitBtn');

    // போட்டோ செலக்ட் பண்ணும்போது ப்ரிவியூ காட்ட
    input.addEventListener('change', function () {
        previewGrid.innerHTML = '';
        if (this.files && this.files.length > 0) {
            uploadText.textContent = this.files.length + ' photo(s) selected ✅';
            Array.from(this.files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function (e) {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    previewGrid.appendChild(img);
                };
                reader.readAsDataURL(file);
            });
        }
    });

    // 👇 ஃபார்ம் சப்மிட் ஆகும்போது பட்டனை மாத்துற லாஜிக் 👇
    if(uploadForm && submitBtn) {
        uploadForm.addEventListener('submit', function() {
            submitBtn.innerHTML = '⏳ Uploading... Please Wait...';
            submitBtn.style.opacity = '0.7';
            submitBtn.style.pointerEvents = 'none'; // ரெண்டாவது முறை க்ளிக் பண்ணாம தடுக்க
        });
    }
</script>
{% endblock %}
