{% extends 'farewell/base.html' %}
{% load static %}

{% block extra_css %}
<style>
    .vault-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 70vh;
        text-align: center;
        font-family: 'Special Elite', monospace;
    }

    .classification-box {
        background: #fdfbf7;
        background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
        padding: 40px;
        border-radius: 4px;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), inset 0 0 100px rgba(0, 0, 0, 0.1);
        position: relative;
        max-width: 450px;
        width: 100%;
        border: 2px solid #ccc;
        transform: rotate(-1deg);
    }

    .stamp {
        position: absolute;
        top: 20px;
        right: 15px;
        color: #d32f2f;
        font-size: 1.5rem;
        font-weight: bold;
        border: 4px solid #d32f2f;
        padding: 5px 10px;
        transform: rotate(15deg);
        opacity: 0.8;
        border-radius: 4px;
        pointer-events: none;
        text-shadow: 1px 1px 0 rgba(255, 255, 255, 0.5);
        box-shadow: inset 0 0 5px rgba(211, 47, 47, 0.3), 0 0 5px rgba(211, 47, 47, 0.3);
        animation: stampIn 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
        animation-delay: 0.5s;
    }

    @keyframes stampIn {
        0% {
            transform: scale(3) rotate(15deg);
            opacity: 0;
        }

        100% {
            transform: scale(1) rotate(15deg);
            opacity: 0.8;
        }
    }

    .lock-icon {
        font-size: 4rem;
        margin-bottom: 20px;
        animation: pulseLock 2s infinite;
        text-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
    }

    @keyframes pulseLock {
        0% {
            transform: scale(1);
        }

        50% {
            transform: scale(1.1);
            filter: drop-shadow(0 0 10px gold);
        }

        100% {
            transform: scale(1);
        }
    }

    .classification-box h2 {
        color: #111;
        font-size: 2rem;
        margin-bottom: 10px;
        letter-spacing: 2px;
        border-bottom: 2px dashed #666;
        padding-bottom: 15px;
    }

    .vault-form {
        margin-top: 30px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    /* Typewriter slot input */
    .typewriter-input {
        width: 100%;
        max-width: 300px;
        padding: 10px 15px;
        margin-bottom: 30px;
        background: transparent;
        color: #111;
        font-family: 'Special Elite', monospace;
        font-size: 1.5rem;
        text-align: center;
        letter-spacing: 5px;
        border: none;
        border-bottom: 4px solid #333;
        outline: none;
        transition: border-color 0.3s;
        box-shadow: 0 10px 10px -10px rgba(0, 0, 0, 0.5) inset;
    }

    .typewriter-input:focus {
        border-bottom-color: #d32f2f;
    }

    .typewriter-input::placeholder {
        color: #999;
        letter-spacing: 1px;
        font-size: 1.2rem;
    }

    .unlock-btn {
        background: linear-gradient(to bottom, #d4af37, #aa8c2c);
        color: #111;
        border: 2px solid #8a6c0c;
        padding: 12px 35px;
        font-size: 1.3rem;
        font-family: 'Special Elite', monospace;
        cursor: pointer;
        font-weight: bold;
        border-radius: 4px;
        box-shadow: 0 6px 0 #6a4c00, 0 10px 20px rgba(0, 0, 0, 0.4);
        transition: all 0.1s;
        text-transform: uppercase;
        letter-spacing: 2px;
        position: relative;
        top: 0;
    }

    .unlock-btn:active {
        top: 6px;
        box-shadow: 0 0px 0 #6a4c00, 0 4px 10px rgba(0, 0, 0, 0.4);
    }

    .unlock-btn:hover {
        filter: brightness(1.1);
    }

    .error-msg {
        color: #d32f2f;
        font-weight: bold;
        margin-top: -15px;
        margin-bottom: 20px;
        font-size: 1.1rem;
        background: rgba(211, 47, 47, 0.1);
        padding: 5px 10px;
        border: 1px dashed #d32f2f;
        border-radius: 3px;
    }
</style>
{% endblock %}

{% block content %}
<div class="vault-container animate-on-scroll fade-in">
    <div class="classification-box">
        <div class="stamp">RESTRICTED AREA<br>TOP SECRET</div>

        <div class="lock-icon">🔐</div>

        <h2>CLEARANCE REQUIRED</h2>
        <p style="color: #444;">Enter decryption sequence to proceed.</p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST" class="vault-form">
            {% csrf_token %}
            <input type="password" name="roll_number" class="typewriter-input" placeholder="CODE" required
                autocomplete="off" maxlength="20">
            <button type="submit" class="unlock-btn">Unlock Vault 🔓</button>
        </form>
    </div>
</div>
{% endblock %}
