{% extends "farewell/base.html" %}
{% load static %}

{% block content %}
<div class="spin-game-container">
    <h2 class="game-title">Thabithal's Pink Bottle Roulette</h2>
    <p class="game-subtitle">Spin to reveal a deep squad secret...</p>

    <div class="roulette-board">
        <img src="{% static 'images/pink_bottle.png' %}" id="spinning-bottle" alt="Pink Bottle">
    </div>

    <div style="text-align: center;">
        <button id="spin-btn" class="spin-btn">🍾 Spin the Bottle!</button>
        <p id="spin-status" class="spin-status"></p>
    </div>

    <!-- Backdrop overlay -->
    <div id="modal-backdrop" class="modal-backdrop"></div>

    <!-- Result Modal -->
    <div id="result-modal" class="result-modal">
        <h3 id="winner-name"></h3>
        <p id="funny-secret"></p>
        <button id="close-modal-btn" class="spin-btn" style="font-size: 1.1rem; padding: 0.6rem 1.8rem;">
            Close ✕
        </button>
    </div>
</div>

{% endblock %}

{% block extra_js %}
<script>
    // Initialise the spin game — called on both hard refresh and HTMX navigation
    function initSpinGame() {
        var spinBtn = document.getElementById('spin-btn');
        var bottle = document.getElementById('spinning-bottle');
        var modal = document.getElementById('result-modal');
        var backdrop = document.getElementById('modal-backdrop');
        var winnerName = document.getElementById('winner-name');
        var funnySecret = document.getElementById('funny-secret');
        var closeModalBtn = document.getElementById('close-modal-btn');
        var spinStatus = document.getElementById('spin-status');

        // Only run if the spin page elements are present
        if (!spinBtn || !bottle) return;
        // Prevent double-binding if already initialised
        if (spinBtn.dataset.spinInit) return;
        spinBtn.dataset.spinInit = 'true';

        var squad = [
            { name: "Uma Maheswaran", secret: "எப்பவும் கிளாஸ்ல தூங்கிட்டே இருப்பான், ஆனா பாஸ் ஆகிடுவான்!" },
            { name: "Veera Pandi", secret: "King maker! கிளாஸ் கட் அடிக்கிறதுல ஸ்பெஷலிஸ்ட்." },
            { name: "Sakthi Kumar", secret: "எல்லா சேட்டைகளிலும் கடைசியா மாட்டிக்கிற அப்பாவி ஜீவன்." },
            { name: "Renjen", secret: "கேன்டீன்லயே பாதி காலேஜ் லைஃப் முடிச்சவரு." },
            { name: "Marisamy", secret: "அசைன்மென்ட் காப்பி அடிக்கிறதுல இவரை அடிச்சுக்க ஆளே இல்லை." },
            { name: "Muniyandi", secret: "எக்ஸாம் ஹால்ல போய்தான் இன்னைக்கு என்ன எக்ஸாம்னு கேப்பான்!" },
            { name: "Keerthana Sree", secret: "பசங்க மாட்டிக்கும்போது காப்பாத்துற ஏஞ்சல்ஸ்ல ஒருத்தர்." },
            { name: "Thabithal", secret: "இந்த பாட்டிலோட ஓனர்! எல்லாரோட தாகத்தையும் தீர்த்த புண்ணியவதி." },
            { name: "Manjula", secret: "எப்பவும் சைலண்டா இருந்துட்டே சில்மிஷம் பண்றதுல கில்லாடி." },
            { name: "Malar", secret: "ரெக்கார்ட் நோட்டு எழுதி பசங்க உசுர காப்பாத்துற தெய்வம்." },
            { name: "Ilamathi", secret: "கேங்கோட ரகசியங்களை வெளிய சொல்லாம காப்பாத்துறது இவங்கதான்." },
            { name: "Rohit Raja (VIP)", secret: "காலேஜுக்கே கெஸ்ட் ரோல்ல வந்துட்டு போற விஐபி!" }
        ];

        var currentDegree = 0;

        /* ── Spin Logic ── */
        spinBtn.addEventListener('click', function () {
            if (spinBtn.disabled) return;

            var randomIndex = Math.floor(Math.random() * squad.length);
            var winner = squad[randomIndex];

            var extraDeg = Math.floor(Math.random() * 360);
            currentDegree += 1440 + extraDeg;

            bottle.style.transform = 'translate(-50%, -50%) rotate(' + currentDegree + 'deg)';
            bottle.classList.add('is-spinning');

            spinBtn.disabled = true;
            spinBtn.textContent = '🌀 Spinning...';
            if (spinStatus) { spinStatus.textContent = 'The bottle is spinning...'; spinStatus.classList.add('visible'); }

            setTimeout(function () {
                bottle.classList.remove('is-spinning');
                if (spinStatus) spinStatus.textContent = '🎯 ' + winner.name + "'s secret revealed!";

                if (winnerName) winnerName.textContent = '🎉 ' + winner.name;
                if (funnySecret) funnySecret.textContent = winner.secret;
                if (modal) modal.classList.add('show');
                if (backdrop) backdrop.classList.add('show');

                if (typeof confetti !== 'undefined') {
                    var colors = ['#d4a574', '#4a6fa5', '#faf3e0', '#f4e4bc', '#ff6b6b', '#ffd93d'];
                    confetti({ particleCount: 120, spread: 90, origin: { x: 0.5, y: 0.6 }, colors: colors });
                    setTimeout(function () {
                        confetti({ particleCount: 60, angle: 60, spread: 70, origin: { x: 0 }, colors: colors });
                        confetti({ particleCount: 60, angle: 120, spread: 70, origin: { x: 1 }, colors: colors });
                    }, 300);
                }

                spinBtn.disabled = false;
                spinBtn.textContent = '🍾 Spin Again!';
            }, 3000);
        });

        /* ── Close Modal ── */
        function closeModal() {
            if (modal) modal.classList.remove('show');
            if (backdrop) backdrop.classList.remove('show');
            if (spinStatus) spinStatus.classList.remove('visible');
        }
        if (closeModalBtn) closeModalBtn.addEventListener('click', closeModal);
        if (backdrop) backdrop.addEventListener('click', closeModal);
    }

    // Run on hard refresh
    document.addEventListener('DOMContentLoaded', initSpinGame);
    // Run after every HTMX page swap (covers normal nav)
    document.addEventListener('htmx:afterSettle', initSpinGame);
</script>
{% endblock %}
